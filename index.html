<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sova Health · Campaign Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#070b12;--s1:#0d1220;--border:#1c2640;--border2:#252d42;--gold:#f5a623;--gold2:#ffd166;--teal:#00c9a7;--red:#ff4d6d;--blue:#4facfe;--purple:#a78bfa;--orange:#fb923c;--text:#e2e8f0;--text2:#7a8aa4;--text3:#3a4a64}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;overflow-x:hidden}
#loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
#loader.gone{display:none}
.spin{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:rot .8s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.spin-msg{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);text-align:center;max-width:320px}
#app{display:none;flex-direction:column;height:100%}
.hdr{background:rgba(13,18,32,.98);border-bottom:1px solid var(--border);padding:11px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
.hdr-l{display:flex;align-items:center;gap:11px}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:12px;color:#000}
.h-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;letter-spacing:-.3px}
.h-sub{font-size:9px;color:var(--text2);font-family:'DM Mono',monospace;margin-top:1px}
.hdr-r{display:flex;align-items:center;gap:8px}
.live-pill{display:flex;align-items:center;gap:5px;background:rgba(0,201,167,.08);border:1px solid rgba(0,201,167,.2);border-radius:20px;padding:3px 9px;font-size:9px;color:var(--teal);font-family:'DM Mono',monospace}
.ld{width:5px;height:5px;border-radius:50%;background:currentColor;animation:p 2s infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-btn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:4px 10px;font-size:10px;cursor:pointer;font-family:'DM Mono',monospace;transition:all .2s;display:flex;align-items:center;gap:5px}
.hdr-btn:hover{border-color:var(--border2);color:var(--text)}
.hdr-btn.spinning svg{animation:rot .8s linear infinite}
.ai-pill{border-radius:20px;padding:3px 9px;font-size:9px;font-family:'DM Mono',monospace;border:1px solid;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s}
.ai-pill.on{background:rgba(167,139,250,.08);border-color:rgba(167,139,250,.25);color:var(--purple)}
.ai-pill.off{background:transparent;border-color:var(--border);color:var(--text3)}
#upd{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace}
.nav{background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;overflow-x:auto;flex-shrink:0;padding:0 18px;scrollbar-width:none}
.nav::-webkit-scrollbar{height:0}
.ntab{padding:10px 14px;font-size:12px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;font-weight:500;flex-shrink:0}
.ntab:hover{color:var(--text)}.ntab.on{color:var(--gold);border-bottom-color:var(--gold)}
.nav-yr{padding:10px 6px 10px 14px;font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:1px;flex-shrink:0;cursor:default}
.nav-sep{width:1px;height:24px;background:var(--border);margin:0 4px;flex-shrink:0;align-self:center}
.content{flex:1;overflow-y:auto;padding:18px 22px}
.content::-webkit-scrollbar{width:4px}.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.panel{display:none}.panel.on{display:block}
.sec{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.8px;margin-bottom:10px;margin-top:20px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}.sec:first-child{margin-top:0}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:9px}
.kpi{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:13px 14px;position:relative;overflow:hidden;transition:border-color .2s,transform .15s}
.kpi:hover{border-color:var(--border2);transform:translateY(-1px)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac,var(--gold))}
.kpi-l{font-family:'DM Mono',monospace;font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.kpi-v{font-family:'Syne',sans-serif;font-weight:700;font-size:19px;letter-spacing:-.5px;line-height:1}
.kpi-f{font-size:10px;color:var(--text2);margin-top:4px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.g31{display:grid;grid-template-columns:2fr 1fr;gap:11px}
.g13{display:grid;grid-template-columns:1fr 2fr;gap:11px}
.card{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:15px 17px}
.ct{font-family:'Syne',sans-serif;font-weight:600;font-size:13px;margin-bottom:2px}
.cs{font-size:10px;color:var(--text2);margin-bottom:12px;font-family:'DM Mono',monospace}
.cw canvas{width:100%!important}
.ai-panel{background:linear-gradient(135deg,rgba(167,139,250,.06),rgba(167,139,250,.01));border:1px solid rgba(167,139,250,.2);border-radius:10px;padding:14px 16px}
.ai-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.ai-badge{background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.3);border-radius:20px;padding:2px 9px;font-size:9px;color:var(--purple);font-family:'DM Mono',monospace}
.ai-ct{font-family:'Syne',sans-serif;font-weight:600;font-size:13px}
.ai-ld{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);font-family:'DM Mono',monospace}
.ad{width:4px;height:4px;border-radius:50%;background:var(--purple);animation:p 1s infinite;display:inline-block}
.ad:nth-child(2){animation-delay:.2s}.ad:nth-child(3){animation-delay:.4s}
.ins-grid{display:flex;flex-direction:column;gap:8px}
.ins{background:rgba(255,255,255,.02);border:1px solid var(--border2);border-radius:8px;padding:11px 13px;border-left:3px solid var(--ac,var(--gold))}
.ins h4{font-family:'Syne',sans-serif;font-size:12px;font-weight:600;margin-bottom:3px;color:var(--ac,var(--gold))}
.ins p{font-size:11px;color:var(--text2);line-height:1.65;margin-bottom:4px}
.ins-act{font-size:10px;color:var(--teal);font-family:'DM Mono',monospace}
.pri{font-size:8px;padding:1px 5px;border-radius:3px;font-family:'DM Mono',monospace;text-transform:uppercase;display:inline-block;margin-bottom:3px}
.ph{background:rgba(255,77,109,.15);color:var(--red);border:1px solid rgba(255,77,109,.3)}
.pm{background:rgba(245,166,35,.15);color:var(--gold);border:1px solid rgba(245,166,35,.3)}
.pl{background:rgba(0,201,167,.15);color:var(--teal);border:1px solid rgba(0,201,167,.3)}
.no-key{background:rgba(122,138,164,.06);border:1px solid var(--border2);border-radius:8px;padding:11px 13px;font-size:11px;color:var(--text2);display:flex;align-items:center;justify-content:space-between;gap:10px}
.no-key button{background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.3);color:var(--gold);border-radius:5px;padding:3px 9px;font-size:10px;cursor:pointer;font-family:'DM Mono',monospace}
.no-key button:hover{background:rgba(245,166,35,.25)}
#km{position:fixed;inset:0;background:rgba(7,11,18,.85);display:none;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(8px)}
.km-c{background:var(--s1);border:1px solid var(--border2);border-radius:14px;padding:28px 32px;width:400px;max-width:92vw}
.km-t{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:5px}
.km-s{font-size:11px;color:var(--text2);margin-bottom:18px;line-height:1.6}
.lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px}
.inp-w{position:relative}
.inp{width:100%;background:var(--bg);border:1px solid var(--border2);border-radius:8px;padding:10px 38px 10px 13px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--gold)}.inp::placeholder{color:var(--text3)}
.eye{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px}
.sv-row{display:flex;align-items:center;gap:7px;margin-top:9px;cursor:pointer}
.sv-row input{accent-color:var(--gold);cursor:pointer}
.sv-row span{font-size:11px;color:var(--text2)}
.km-btns{display:flex;gap:8px;margin-top:15px}
.b-save{flex:1;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:8px;padding:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:#000;cursor:pointer}
.b-cancel{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:10px 14px;font-size:11px;color:var(--text2);cursor:pointer;font-family:'DM Mono',monospace}
.dtbl{width:100%;border-collapse:collapse}
.dtbl th{font-family:'DM Mono',monospace;font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);padding:7px 9px;border-bottom:1px solid var(--border);text-align:left;font-weight:400;white-space:nowrap}
.dtbl td{padding:7px 9px;border-bottom:1px solid rgba(28,38,64,.4);font-size:11px}
.dtbl tr:hover td{background:rgba(255,255,255,.012)}.dtbl tr:last-child td{border-bottom:none}
.nm{font-family:'DM Mono',monospace;font-size:11px}
.tag{font-size:8px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:3px;text-transform:uppercase;white-space:nowrap}
.bb{height:4px;border-radius:2px;display:inline-block;vertical-align:middle}
.funnel{display:flex;flex-direction:column;gap:6px;padding:5px 0}
.fs{display:flex;align-items:center;gap:8px}
.fl{width:72px;font-size:9px;color:var(--text2);text-align:right;font-family:'DM Mono',monospace;flex-shrink:0}
.fbw{flex:1;height:22px}
.fb{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:9px;font-family:'DM Mono',monospace;font-size:10px;overflow:hidden;white-space:nowrap}
.clist{display:flex;flex-direction:column;gap:5px}
.crow{display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(255,255,255,.015);border-radius:7px;border:1px solid transparent;transition:border-color .2s}
.crow:hover{border-color:var(--border2)}
.cn{flex:1;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ctr{width:88px;height:4px;background:var(--border);border-radius:2px;flex-shrink:0}
.cfi{height:100%;border-radius:2px}
.cv{font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);width:70px;text-align:right;flex-shrink:0}
.cmp-hdr{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:9px}
.ccard{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:13px 15px;text-align:center}
.cm{font-family:'DM Mono',monospace;font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.cv2{font-family:'Syne',sans-serif;font-weight:700;font-size:21px;letter-spacing:-.5px}
.cs2{font-size:10px;color:var(--text2);margin-top:3px}
.du{color:var(--teal);font-family:'DM Mono',monospace;font-size:10px}
.dd{color:var(--red);font-family:'DM Mono',monospace;font-size:10px}
.yoy-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(79,172,254,.08);border:1px solid rgba(79,172,254,.2);border-radius:20px;padding:2px 8px;font-size:9px;color:var(--blue);font-family:'DM Mono',monospace}
.footer{text-align:center;padding:14px;border-top:1px solid var(--border);margin-top:20px}
.footer p{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
@media(max-width:900px){.g2,.g31,.g3,.g13{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="loader"><div class="spin"></div><div class="spin-msg" id="smsg">Loading data.json...</div></div>

<div id="km">
  <div class="km-c">
    <div class="km-t">🔑 Anthropic API Key</div>
    <div class="km-s">Enables Claude AI insights on every tab. Get yours at <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:var(--blue)">console.anthropic.com</a> → Create Key.</div>
    <div class="lbl">API Key</div>
    <div class="inp-w">
      <input id="km-inp" class="inp" type="password" placeholder="sk-ant-api03-...">
      <button class="eye" onclick="var i=document.getElementById('km-inp');i.type=i.type==='password'?'text':'password'">👁</button>
    </div>
    <label class="sv-row"><input type="checkbox" id="km-save" checked><span>Remember in this browser</span></label>
    <div class="km-btns"><button class="b-save" onclick="applyKey()">Save & Analyze</button><button class="b-cancel" onclick="closeKM()">Cancel</button></div>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-l">
      <div class="logo">SH</div>
      <div><div class="h-title">Sova Health · Campaign Intelligence</div><div class="h-sub" id="h-sub">LIVE · AUTO-REFRESH · YEAR-ON-YEAR READY</div></div>
    </div>
    <div class="hdr-r">
      <span id="upd"></span>
      <button class="hdr-btn" id="rf-btn" onclick="doRefresh()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>Refresh
      </button>
      <div class="ai-pill off" id="ai-pill" onclick="openKM()"><span class="ld"></span><span id="ai-txt">AI OFF</span></div>
      <div class="live-pill"><div class="ld"></div>LIVE</div>
    </div>
  </div>
  <div class="nav" id="nav"></div>
  <div class="content" id="content"></div>
</div>

<script>
const ST={sheets:{},sheetKeys:[],years:[],activeTab:null,charts:{},cache:{},apiKey:localStorage.getItem('sova_ak')||''};
const PAL=['#f5a623','#00c9a7','#a78bfa','#4facfe','#fb923c','#ff4d6d','#ffd166','#06d6a0','#e040fb','#00bcd4','#ff7043','#26c6da'];
const tc=(team,teams)=>PAL[Math.max(0,teams.indexOf(team))%PAL.length];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── LOAD DATA ──
async function loadData(){
  document.getElementById('smsg').textContent='Loading data.json...';
  const res=await fetch('data.json?v='+Date.now());
  if(!res.ok)throw new Error(`HTTP ${res.status} — data.json not found. Run extract.py first.`);
  const json=await res.json();
  const order=json.sheet_order||Object.keys(json.sheets||{});
  ST.sheets={};ST.sheetKeys=[];
  for(const key of order){
    const s=json.sheets[key];if(!s)continue;
    const camps=Array.isArray(s)?s:(s.campaigns||[]);
    if(!camps.length)continue;
    const rrs=camps.filter(c=>c.read_rate>0).map(c=>c.read_rate);
    ST.sheets[key]={key,name:s.name||key,year:s.year||2026,month_num:s.month_num||0,campaigns:camps,
      summary:s.summary||{total_revenue:camps.reduce((a,c)=>a+c.revenue,0),total_sent:camps.reduce((a,c)=>a+c.sent,0),total_delivered:camps.reduce((a,c)=>a+c.delivered,0),total_campaigns:camps.length,avg_read_rate:rrs.length?rrs.reduce((a,v)=>a+v,0)/rrs.length:0}};
    ST.sheetKeys.push(key);
  }
  if(!ST.sheetKeys.length)throw new Error('No data in data.json. Run extract.py first.');
  ST.years=[...new Set(ST.sheetKeys.map(k=>ST.sheets[k].year))].sort();
  const total=ST.sheetKeys.reduce((s,k)=>s+ST.sheets[k].campaigns.length,0);
  document.getElementById('h-sub').textContent=`${ST.sheetKeys.length} SHEETS · ${total} CAMPAIGNS · ${ST.years.join(' & ')}`;
  if(json.last_updated){const d=new Date(json.last_updated);document.getElementById('upd').textContent=d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});}
}

async function init(){
  try{
    await loadData();buildNav();updateAIPill();
    document.getElementById('loader').classList.add('gone');
    document.getElementById('app').style.display='flex';
    const first=document.querySelector('.ntab:not(.nav-yr)');
    if(first){first.classList.add('on');ST.activeTab=ST.sheetKeys[0];renderTab(ST.sheetKeys[0]);}
    setInterval(doRefresh,5*60*1000);
  }catch(e){
    document.getElementById('smsg').innerHTML=`<span style="color:var(--red)">${e.message}</span><br><span style="font-size:10px;margin-top:8px;display:block">Make sure data.json is in the same folder and the sheet is public.</span>`;
  }
}

async function doRefresh(){
  const btn=document.getElementById('rf-btn');btn.classList.add('spinning');ST.cache={};
  try{await loadData();buildNav();if(ST.activeTab)renderTab(ST.activeTab);}catch(e){}
  btn.classList.remove('spinning');
}

// ── NAV ──
function buildNav(){
  const nav=document.getElementById('nav');let html='';
  const multiYear=ST.years.length>1;
  if(multiYear){
    ST.years.forEach(yr=>{
      const yrKeys=ST.sheetKeys.filter(k=>ST.sheets[k].year===yr);
      html+=`<div class="nav-yr">${yr}</div>`;
      yrKeys.forEach(k=>{const short=ST.sheets[k].name.replace(/\s*20\d{2}/,'').trim();html+=`<div class="ntab" onclick="clickTab('${k}',this)">${short}</div>`;});
      html+=`<div class="nav-sep"></div>`;
    });
  } else {
    ST.sheetKeys.forEach(k=>{html+=`<div class="ntab" onclick="clickTab('${k}',this)">${ST.sheets[k].name}</div>`;});
  }
  if(ST.sheetKeys.length>1)html+=`<div class="ntab" onclick="clickTab('__trend',this)">📈 Full Trend</div>`;
  if(ST.years.length>1)html+=`<div class="ntab" onclick="clickTab('__yoy',this)">⚡ Year-on-Year</div>`;
  html+=`<div class="ntab" onclick="clickTab('__cmp',this)">⚖️ Comparison</div>`;
  nav.innerHTML=html;
  // Re-mark active tab
  if(ST.activeTab){
    const el=nav.querySelector(`.ntab[onclick*="${ST.activeTab}"]`);
    if(el)el.classList.add('on');
  }
}

function clickTab(key,el){document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('on'));el.classList.add('on');ST.activeTab=key;renderTab(key);}
function renderTab(key){const c=document.getElementById('content');if(key==='__cmp')renderCmp(c);else if(key==='__trend')renderTrend(c);else if(key==='__yoy')renderYoY(c);else if(ST.sheets[key])renderSheet(c,ST.sheets[key]);}

// ── HELPERS ──
function avg(a){return a.length?a.reduce((s,v)=>s+v,0)/a.length:0;}
function fmt(n){if(n>=100000)return'₹'+(n/100000).toFixed(2)+'L';if(n>=1000)return'₹'+Math.round(n/1000)+'K';return'₹'+Math.round(n).toLocaleString('en-IN');}
function full(n){return'₹'+Math.round(n).toLocaleString('en-IN');}
function pct(a,b){return b?((a-b)/b*100).toFixed(1):null;}
function dc(id){if(ST.charts[id]){ST.charts[id].destroy();delete ST.charts[id];}}
function rc(id,cfg){dc(id);const el=document.getElementById(id);if(el)ST.charts[id]=new Chart(el,cfg);}
const sx=()=>({grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#3a4a64',font:{family:'DM Mono',size:9}}});
const sy=(cb)=>({grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#3a4a64',font:{family:'DM Mono',size:9},callback:cb}});
function ts(data){const t={};data.forEach(d=>{if(!t[d.team])t[d.team]={rev:0,sent:0,del:0,camps:0,rrs:[]};t[d.team].rev+=d.revenue;t[d.team].sent+=d.sent;t[d.team].del+=d.delivered;t[d.team].camps++;if(d.read_rate>0)t[d.team].rrs.push(d.read_rate);});return t;}

// ── CLAUDE ──
async function getAI(cacheKey,prompt){
  if(!ST.apiKey)return null;if(ST.cache[cacheKey])return ST.cache[cacheKey];
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':ST.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,messages:[{role:'user',content:prompt}]})});
    const d=await r.json();if(d.error)throw new Error(d.error.message);
    const text=d.content?.find(b=>b.type==='text')?.text||'';
    const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    ST.cache[cacheKey]=parsed;return parsed;
  }catch(e){console.warn('Claude:',e.message);return{_error:e.message};}
}

function insHTML(a){
  if(!a)return noKey();
  if(a._error)return`<div style="color:var(--red);font-size:11px;font-family:'DM Mono',monospace">⚠ ${a._error}</div>`;
  return`<div class="ins-grid">${(a.insights||[]).map(i=>{const pc=i.priority==='high'?'ph':i.priority==='medium'?'pm':'pl';return`<div class="ins" style="--ac:${i.color||'var(--gold)'}"><span class="pri ${pc}">${(i.priority||'').toUpperCase()}</span><h4>${i.title}</h4><p>${i.finding}</p><div class="ins-act">→ ${i.action}</div></div>`;}).join('')}</div>`;
}
function noKey(){return`<div class="no-key"><span>Add Anthropic API key to enable Claude AI insights</span><button onclick="openKM()">🔑 Add Key</button></div>`;}
function ldAI(){return`<div class="ai-ld"><div class="ad"></div><div class="ad"></div><div class="ad"></div><span style="margin-left:6px">Analyzing with Claude...</span></div>`;}
function trigAI(cKey,prompt,elId){
  if(!ST.apiKey)return;const el=document.getElementById(elId);if(!el)return;
  if(ST.cache[cKey]){el.innerHTML=insHTML(ST.cache[cKey]);return;}
  el.innerHTML=ldAI();
  getAI(cKey,prompt).then(a=>{const e=document.getElementById(elId);if(e)e.innerHTML=insHTML(a);});
}

  <div class="sec">Year-on-Year · ${y1} vs ${y2}<span class="yoy-badge" style="margin-left:8px">⚡ YOY</span></div>
  <div class="kpis">
    <div class="kpi" style="--ac:var(--blue)"><div class="kpi-l">${y1} Total</div><div class="kpi-v">${full(y1r)}</div><div class="kpi-f">${y1k.length} months</div></div>
    <div class="kpi" style="--ac:var(--gold)"><div class="kpi-l">${y2} Total</div><div class="kpi-v">${full(y2r)}</div><div class="kpi-f">${y2k.length} months</div></div>
    <div class="kpi" style="--ac:${yp&&+yp>=0?'var(--teal)':'var(--red)'}"><div class="kpi-l">YoY Growth</div><div class="kpi-v" style="color:${yp&&+yp>=0?'var(--teal)':'var(--red)'}">${yp?`${+yp>=0?'▲':'▼'}${Math.abs(yp)}%`:'—'}</div><div class="kpi-f">${y1} → ${y2}</div></div>
    <div class="kpi" style="--ac:var(--purple)"><div class="kpi-l">${y2} Avg/Month</div><div class="kpi-v">${y2k.length?full(y2r/y2k.length):'—'}</div><div class="kpi-f">monthly average</div></div>
    <div class="kpi" style="--ac:var(--orange)"><div class="kpi-l">Revenue Diff</div><div class="kpi-v" style="font-size:16px">${full(Math.abs(y2r-y1r))}</div><div class="kpi-f">${y2r>y1r?'gain':'decline'} vs ${y1}</div></div>
  </div>
  <div class="sec">✦ Claude YoY Analysis</div>
  <div class="ai-panel"><div class="ai-hdr"><span class="ai-badge">✦ CLAUDE</span><span class="ai-ct">Year-on-Year Intelligence · ${y1} vs ${y2}</span></div><div id="ai-yoy">${noKey()}</div></div>
  <div class="sec">Side-by-Side Charts</div>
  <div class="g2">
    <div class="card"><div class="ct">Monthly Revenue · ${y1} vs ${y2}</div><div class="cs">Same months compared</div><div class="cw" style="height:225px"><canvas id="c-yb"></canvas></div></div>
    <div class="card"><div class="ct">Trend Lines · ${y1} vs ${y2}</div><div class="cs">Trajectory comparison</div><div class="cw" style="height:225px"><canvas id="c-yl"></canvas></div></div>
  </div>
  <div class="sec">Monthly Breakdown Table</div>
  <div class="card"><div class="ct">${y1} vs ${y2} · Month by Month</div><div class="cs">Direct comparison with YoY delta</div>
    <div style="overflow-x:auto"><table class="dtbl"><thead><tr><th>Month</th><th style="text-align:right">${y1}</th><th style="text-align:right">${y2}</th><th style="text-align:right">YoY Δ</th><th style="text-align:right">Abs Diff</th></tr></thead>
    <tbody>${mNums.map((mn,i)=>{const r1=y1d[i],r2=y2d[i];const d=r1&&r2?pct(r2,r1):null;const dh=d?`<span class="${+d>=0?'du':'dd'}">${+d>=0?'▲':'▼'}${Math.abs(d)}%</span>`:'—';return`<tr><td style="font-weight:500">${mLbls[i]}</td><td class="nm" style="text-align:right;color:var(--blue)">${r1?full(r1):'—'}</td><td class="nm" style="text-align:right;color:var(--gold)">${r2?full(r2):'—'}</td><td class="nm" style="text-align:right">${dh}</td><td class="nm" style="text-align:right;color:${r1&&r2&&r2>=r1?'var(--teal)':'var(--red)'}">${r1&&r2?full(Math.abs(r2-r1)):'—'}</td></tr>`;}).join('')}
    <tr style="background:rgba(255,255,255,.02)"><td style="font-weight:700">TOTAL</td><td class="nm" style="text-align:right;font-weight:700;color:var(--blue)">${full(y1r)}</td><td class="nm" style="text-align:right;font-weight:700;color:var(--gold)">${full(y2r)}</td><td class="nm" style="text-align:right;font-weight:700">${yp?`<span class="${+yp>=0?'du':'dd'}">${+yp>=0?'▲':'▼'}${Math.abs(yp)}%</span>`:'—'}</td><td class="nm" style="text-align:right;font-weight:700;color:${y2r>=y1r?'var(--teal)':'var(--red)'}">${full(Math.abs(y2r-y1r))}</td></tr>
    </tbody></table></div>
  </div>
  <div class="footer"><p>SOVA HEALTH · YEAR-ON-YEAR · ${y1} VS ${y2}</p></div>
  </div>`;

  requestAnimationFrame(()=>{
    rc('c-yb',{type:'bar',data:{labels:mLbls,datasets:[{label:String(y1),data:y1d,backgroundColor:'rgba(79,172,254,.35)',borderColor:'#4facfe',borderWidth:2,borderRadius:4},{label:String(y2),data:y2d,backgroundColor:'rgba(245,166,35,.35)',borderColor:'#f5a623',borderWidth:2,borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#7a8aa4',font:{size:9,family:'DM Mono'},boxWidth:8,padding:9}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+full(c.raw||0)}}},scales:{x:sx(),y:sy(v=>fmt(v))}}});
    rc('c-yl',{type:'line',data:{labels:mLbls,datasets:[{label:String(y1),data:y1d,borderColor:'#4facfe',backgroundColor:'rgba(79,172,254,.06)',pointBackgroundColor:'#4facfe',pointRadius:5,fill:true,tension:.4,borderWidth:2,spanGaps:true},{label:String(y2),data:y2d,borderColor:'#f5a623',backgroundColor:'rgba(245,166,35,.06)',pointBackgroundColor:'#f5a623',pointRadius:5,fill:true,tension:.4,borderWidth:2,spanGaps:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#7a8aa4',font:{size:9,family:'DM Mono'},boxWidth:8,padding:9}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+full(c.raw||0)}}},scales:{x:sx(),y:sy(v=>fmt(v))}}});
  });
  trigAI('__yoy',yoyPrompt(y1,y2),'ai-yoy');
}

// ── RENDER COMPARISON ──
function renderCmp(container){
  const keys=ST.sheetKeys;const revs=keys.map(k=>ST.sheets[k].summary.total_revenue);
  const allTeams=[...new Set(Object.values(ST.sheets).flatMap(s=>s.campaigns.map(c=>c.team)))];

  container.innerHTML=`<div class="panel on">
  <div class="sec">Month-on-Month Summary</div>
  <div class="cmp-hdr">${keys.map((k,i)=>{const d=i>0?pct(revs[i],revs[i-1]):null;return`<div class="ccard" style="border-top:2px solid ${PAL[i%PAL.length]}"><div class="cm">${ST.sheets[k].name}</div><div class="cv2" style="color:${PAL[i%PAL.length]}">${full(revs[i])}</div><div class="cs2">${ST.sheets[k].summary.total_campaigns} camps</div>${d!==null?`<div class="${+d>=0?'du':'dd'}">${+d>=0?'▲':'▼'}${Math.abs(d)}% MoM</div>`:''}</div>`;}).join('')}</div>
  <div class="sec">✦ Claude Comparison Analysis</div>
  <div class="ai-panel"><div class="ai-hdr"><span class="ai-badge">✦ CLAUDE</span><span class="ai-ct">Cross-Month Intelligence</span></div><div id="ai-cmp">${noKey()}</div></div>
  <div class="sec">Revenue Trends</div>
  <div class="g2">
    <div class="card"><div class="ct">Revenue Per Month</div><div class="cs">All months comparison</div><div class="cw" style="height:215px"><canvas id="c-cr"></canvas></div></div>
    <div class="card"><div class="ct">Team Revenue · MoM</div><div class="cs">Team breakdown per month</div><div class="cw" style="height:215px"><canvas id="c-ct"></canvas></div></div>
  </div>
  <div class="sec">Full KPI Table</div>
  <div class="card"><div class="ct">All Metrics · All Months · With Deltas</div><div class="cs">Complete comparison</div>
    <div style="overflow-x:auto"><table class="dtbl" id="cmp-tbl"></table></div>
  </div>
  <div class="footer"><p>SOVA HEALTH · MONTH-ON-MONTH COMPARISON</p></div>
  </div>`;

  requestAnimationFrame(()=>{
    rc('c-cr',{type:'bar',data:{labels:keys.map(k=>ST.sheets[k].name),datasets:[{data:revs,backgroundColor:keys.map((_,i)=>PAL[i%PAL.length]+'44'),borderColor:keys.map((_,i)=>PAL[i%PAL.length]),borderWidth:2,borderRadius:5,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>full(c.raw)}}},scales:{x:sx(),y:sy(v=>fmt(v))}}});
    rc('c-ct',{type:'bar',data:{labels:keys.map(k=>ST.sheets[k].name),datasets:allTeams.map((t,i)=>({label:t,data:keys.map(k=>ST.sheets[k].campaigns.filter(c=>c.team===t).reduce((s,c)=>s+c.revenue,0)),backgroundColor:PAL[i%PAL.length]+'33',borderColor:PAL[i%PAL.length],borderWidth:2,borderRadius:3}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#7a8aa4',font:{size:9,family:'DM Mono'},boxWidth:7,padding:8}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+full(c.raw)}}},scales:{x:sx(),y:sy(v=>fmt(v))}}});
    const rows=[['Revenue',keys.map((k,i)=>full(revs[i])),true],['Campaigns',keys.map(k=>ST.sheets[k].summary.total_campaigns),false],['Sent',keys.map(k=>ST.sheets[k].summary.total_sent.toLocaleString('en-IN')),false],['Avg Read%',keys.map(k=>(ST.sheets[k].summary.avg_read_rate||0).toFixed(1)+'%'),false],['Rev/Camp',keys.map(k=>{const s=ST.sheets[k].summary;return s.total_campaigns?full(s.total_revenue/s.total_campaigns):'—';}),false],['RPM',keys.map(k=>{const s=ST.sheets[k].summary;return s.total_sent?'₹'+Math.round(s.total_revenue/s.total_sent*1000):'—';}),false]];
    document.getElementById('cmp-tbl').innerHTML=`<thead><tr><th>Metric</th>${keys.map((k,i)=>`<th style="text-align:right;color:${PAL[i%PAL.length]}">${ST.sheets[k].name}</th>`).join('')}</tr></thead><tbody>`+rows.map(([lbl,vals,bold])=>`<tr><td style="${bold?'font-weight:600':''}"> ${lbl}</td>${vals.map((v,i)=>{const d=bold&&i>0?pct(revs[i],revs[i-1]):null;const dh=d?` <span class="${+d>=0?'du':'dd'}" style="font-size:9px">${+d>=0?'▲':'▼'}${Math.abs(d)}%</span>`:'';return`<td class="nm" style="text-align:right">${v}${dh}</td>`;}).join('')}</tr>`).join('')+'</tbody>';
  });
  trigAI('__cmp',trendPrompt(),'ai-cmp');
}

// ── KEY MODAL ──
function openKM(){document.getElementById('km-inp').value=ST.apiKey;document.getElementById('km').style.display='flex';}
function closeKM(){document.getElementById('km').style.display='none';}
function applyKey(){const key=document.getElementById('km-inp').value.trim();if(!key){alert('Please enter a key');return;}ST.apiKey=key;if(document.getElementById('km-save').checked)localStorage.setItem('sova_ak',key);closeKM();updateAIPill();ST.cache={};if(ST.activeTab)renderTab(ST.activeTab);}
function updateAIPill(){const pill=document.getElementById('ai-pill'),txt=document.getElementById('ai-txt');if(!pill||!txt)return;if(ST.apiKey){pill.className='ai-pill on';txt.textContent='AI ACTIVE';}else{pill.className='ai-pill off';txt.textContent='AI OFF';}}

init();
</script>
</body>
</html>
